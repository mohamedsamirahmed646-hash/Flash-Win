# Netlify configuration for FlashWin landing page
# ملاحظة: في الغالب مش محتاج تلمس الملف ده — Netlify بيشتغل أوتوماتيك

[build]
  publish = "."

# Security headers + caching للسرعة
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Cache قوي للصور (yearly) + HTML (short cache)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Force HTTPS + remove trailing slash
[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301
  force = false
